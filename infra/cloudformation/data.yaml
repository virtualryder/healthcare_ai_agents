AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HPP Suite - Data stack (append-only PHI-masked audit DynamoDB with PITR, HITL approvals
  table, WORM S3 Object Lock COMPLIANCE bucket). Supports HIPAA Security Rule audit controls
  (45 CFR 164.312(b)) and tamper-evident records retention.
Parameters:
  AgentId: {Type: String, Default: 01-revenue-cycle-denial}
  Environment: {Type: String, Default: dev}
  KmsKeyArn: {Type: String}
  AuditRetentionDays: {Type: Number, Default: 2555, Description: "WORM retention; default 7 years. Tune to the org records schedule."}
  RetentionMode:
    Type: String
    Default: COMPLIANCE
    AllowedValues: [COMPLIANCE, GOVERNANCE]
    Description: "S3 Object Lock mode. COMPLIANCE (regulated production) cannot be bypassed by anyone; GOVERNANCE (pilots) can be bypassed only with s3:BypassGovernanceRetention, which the bucket policy denies except the break-glass role."
  BreakGlassRoleArn:
    Type: String
    Default: ""
    Description: "Optional ARN of the single break-glass role permitted to bypass GOVERNANCE retention (MFA + second-approver + time-boxed + alarmed). Empty = no bypass permitted."
Resources:
  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "hpp-${AgentId}-${Environment}-audit"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - {AttributeName: audit_id, AttributeType: S}
        - {AttributeName: ts, AttributeType: S}
      KeySchema:
        - {AttributeName: audit_id, KeyType: HASH}
        - {AttributeName: ts, KeyType: RANGE}
      PointInTimeRecoverySpecification: {PointInTimeRecoveryEnabled: true}
      SSESpecification: {SSEEnabled: true, SSEType: KMS, KMSMasterKeyId: !Ref KmsKeyArn}
  HitlTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "hpp-${AgentId}-${Environment}-hitl"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions: [{AttributeName: review_id, AttributeType: S}]
      KeySchema: [{AttributeName: review_id, KeyType: HASH}]
      SSESpecification: {SSEEnabled: true, SSEType: KMS, KMSMasterKeyId: !Ref KmsKeyArn}
  WormBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "hpp-${AgentId}-${Environment}-worm-${AWS::AccountId}"
      ObjectLockEnabled: true
      ObjectLockConfiguration:
        ObjectLockEnabled: Enabled
        Rule: {DefaultRetention: {Mode: !Ref RetentionMode, Days: !Ref AuditRetentionDays}}
      VersioningConfiguration: {Status: Enabled}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - {ServerSideEncryptionByDefault: {SSEAlgorithm: aws:kms, KMSMasterKeyID: !Ref KmsKeyArn}}
      PublicAccessBlockConfiguration:
        {BlockPublicAcls: true, BlockPublicPolicy: true, IgnorePublicAcls: true, RestrictPublicBuckets: true}
  # Governance-bypass control: deny s3:BypassGovernanceRetention + locked-version deletion for
  # everyone except an optional break-glass role. Enable CloudTrail S3 data events on this bucket
  # (account level) to log any attempt. See RETENTION-MODES.md.
  WormBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WormBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyGovernanceRetentionBypassExceptBreakGlass
            Effect: Deny
            Principal: "*"
            Action: [s3:BypassGovernanceRetention, s3:DeleteObjectVersion]
            Resource: !Sub "${WormBucket.Arn}/*"
            Condition:
              StringNotEquals:
                aws:PrincipalArn: !Ref BreakGlassRoleArn
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !GetAtt WormBucket.Arn
              - !Sub "${WormBucket.Arn}/*"
            Condition:
              Bool: {"aws:SecureTransport": false}
Outputs:
  AuditTableName: {Value: !Ref AuditTable}
  HitlTableName: {Value: !Ref HitlTable}
  WormBucketName: {Value: !Ref WormBucket}
  # NOTE: append-only is enforced by an Org SCP / IAM policy denying dynamodb:UpdateItem &
  # dynamodb:DeleteItem on the audit table (the agent role above grants only PutItem/Get/Query).
  # See ../../runbooks (roadmap) for the SCP and the WORM legal-hold procedure.
